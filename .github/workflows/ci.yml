name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore SnipLink.sln

      - name: Build
        run: dotnet build SnipLink.sln --no-restore -c Release

      - name: Run tests
        run: |
          dotnet test src/SnipLink.Tests/SnipLink.Tests.csproj \
            --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: coverage/

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build for CodeQL
        run: dotnet build SnipLink.sln -c Release

      - uses: github/codeql-action/analyze@v3

  docker:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t sniplink-api .

      - name: Run container
        run: docker run -d -p 8080:8080 sniplink-api

      - name: Wait for startup
        run: sleep 10

      - name: Health check
        run: curl -f http://localhost:8080/healthz
